  <main class="main-content">
    <div class="container" style="color: #13347b;">
      <div class="cardFormulario">
        <h1>Cadastro de Unidades</h1>

        <p><span>Selecione o hospital desejado:</span> <br>
          <select class="selectCadastro" name="select_hospital" id="select_hospital">
            <option value="0" selected disabled>Selecione um hospital</option>
          </select>
        </p>

        <p><span>CEP:</span> <br>
          <input class="inputCadastro" type="text" id="input_cep" maxlength="9" oninput="buscarcep()"
            placeholder="Exemplo: 01414001 ou 01414-001">
        </p>

        <p><span>Rua:</span> <br>
          <input class="inputCadastro" type="text" id="input_rua" maxlength="50" placeholder="Rua Ouvidores">
        </p>

        <p><span>Cidade:</span> <br>
          <input class="inputCadastro" type="text" id="input_cidade" maxlength="50" placeholder="São Paulo">
        </p>

        <p><span>Número:</span> <br>
          <input class="inputCadastro" type="text" id="input_numero" maxlength="50" placeholder="1230">
        </p>

        <p><span>Descrição da Unidade:</span> <br>
          <input class="inputCadastro" type="text" id="input_unidade" placeholder="Exemplo: Unidade Zona Sul">
        </p>

        <p><span>Email do Responsável:</span> <br>
          <input class="inputCadastro" type="text" id="input_emailResponsavel" maxlength="50"
            placeholder="meuemail@dominio.com">
        </p>

        <p><span>Telefone do Responsável:</span> <br>
          <input class="inputCadastro" type="text" id="input_telefoneResponsavel" maxlength="11"
            placeholder="11945236578">
        </p>

        <p><span>Total de Internet:</span> <br>
          <input class="inputCadastro" type="text" id="input_redeTotal" placeholder="150.00 Mb/s">
        </p>

        <p>
          <button class="botaoCadastrar" onclick="cadastrarUnidade()">Cadastrar Unidade</button>
        </p>
        <div id="div_erroCadastro"></div>
      </div>
    </div>
  </main>

<script>
  window.onload = function () {
    validarSessao();
    listarHospitais();
  };

  function listarHospitais() {
    var idEmpresa = sessionStorage.FK_EMPRESA
    fetch(`/hospital/buscarHospitais?idEmpresa=${idEmpresa}`)
      .then(function (resposta) {
        return resposta.json();
      })
      .then(function (hospitais) {

        const select = document.getElementById("select_hospital");

        hospitais.forEach(hospital => {
          const option = document.createElement("option");

          option.value = hospital.id_hospital;
          option.textContent = hospital.nome_hospital;

          select.appendChild(option);
        });

      })
      .catch(function (erro) {
        console.error("Erro ao buscar hospitais:", erro);
      });
  }

  function buscarcep() {
    var cepOriginal = input_cep.value;
    var cep = cepOriginal.replace(/\D/g, ""); // D ignora tudo que é não numérico e o g deixa válido para toda a input, não somente no primeiro cenário

    if (cep.length == 8 || cep.length == 9) {
      fetch(`https://viacep.com.br/ws/${cep}/json/`)
        .then(function (resposta) {
          return resposta.json();
        })
        .then(function (dados) {
          if (!dados.erro) {
            input_rua.value = dados.logradouro;
            input_cidade.value = dados.localidade;
            div_erroCadastro.innerHTML = "";
          } else {
            div_erroCadastro.innerHTML = `CEP não encontrado.<br>`;
            input_rua.value = "";
            input_cidade.value = "";
          }
        })
        .catch(function (erro) {
          console.log("Erro na busca:", erro);
        });
    }
  }

  function cadastrarUnidade() {
    var cepOriginal = input_cep.value;
    var cep = cepOriginal.replace(/\D/g, "");
    var fkHospital = select_hospital.value;
    var rua = input_rua.value;
    var numero = input_numero.value;
    var cidade = input_cidade.value;
    var unidade = input_unidade.value;
    var emailResponsavel = input_emailResponsavel.value;
    var telefoneResponsavel = input_telefoneResponsavel.value;
    var redeTotal = Number(input_redeTotal.value);

    div_erroCadastro.innerHTML = "";
    div_erroCadastro.style.color = "red";

    var mensagemErro = "";

    if (fkHospital == "0") {
      mensagemErro += "Selecione um hospital.<br>";
    }

    if (unidade == "" || cep == "" || rua == "" || numero == "" || cidade == "") {
      mensagemErro += "Preencha todos os campos de endereço (Unidade, CEP, Rua, Num e Cidade).<br>";
    }

    if (!emailResponsavel.includes("@") || emailResponsavel.length < 5 || !emailResponsavel.includes(".com")) {
      mensagemErro += "Insira um e-mail válido para o responsável.<br>";
    }

    if (telefoneResponsavel.length < 10) {
      mensagemErro += "O telefone deve conter pelo menos 10 dígitos (DDD + número).<br>";
    }

    if (isNaN(redeTotal)) {
      mensagemErro += "Apenas valores numéricos são aceitos no campo de rede.<br>";
    }

    if (mensagemErro != "") {
      div_erroCadastro.innerHTML = mensagemErro;
      return;
    }

    div_erroCadastro.innerHTML = "";

    fetch("/unidade/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        cepServer: cep,
        ruaServer: rua,
        numeroServer: numero,
        cidadeServer: cidade,
        unidadeServer: unidade,
        emailResponsavelServer: emailResponsavel,
        telefoneResponsavelServer: telefoneResponsavel,
        fkHospitalServer: fkHospital,
        redeTotalServer: redeTotal
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);
        div_erroCadastro.style.color = "green";
        div_erroCadastro.innerHTML = "Cadastro de Unidade realizado com sucesso!";

        input_cep.value = "";
        select_hospital.value = "0";
        input_rua.value = "";
        input_numero.value = "";
        input_cidade.value = "";
        input_unidade.value = "";
        input_emailResponsavel.value = "";
        input_telefoneResponsavel.value = "";
        input_redeTotal.value = "";

        return resposta.json();
      })
  }

</script>
