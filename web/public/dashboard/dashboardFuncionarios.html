    <script>
        window.onload = function() {
            validarSessao();
            listarFuncionarios();
        };

        function listarFuncionarios() {

            var fk_empresa = sessionStorage.FK_EMPRESA;
            var corpoTabela = document.getElementById("corpoTabela");

            fetch('/usuarios/listarFuncionarios?fk_empresa=' + fk_empresa)
                .then(function (resposta) {
                    return resposta.json();
                })
                .then(function (funcionarios) {

                    for (var i = 0; i < funcionarios.length; i++) {

                        corpoTabela.innerHTML += `
                            <tr>
                                <td>${funcionarios[i].id_usuario}</td>
                                <td>${funcionarios[i].nome_usuario}</td>
                                <td>${funcionarios[i].email}</td>
                                <td>${funcionarios[i].cpf}</td>
                            </tr>
                        `;
                    }

                    $('#example').DataTable({
                        language: {
                            url: 'https://cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json'
                        },
                        pagingType: "simple"
                    });

                })
                .catch(function (erro) {
                    console.log(erro);
                });

        }
    </script>
