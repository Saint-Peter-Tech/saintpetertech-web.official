                </p>

<script>
    window.onload = function () {
        validarSessao();
    };

    function cadastrarModelo() {
        var nomeModelo = input_nomeModelo.value;
        var dataLancamento = data_lancamento.value;
        var marca = input_marca.value;
        var descricao = input_descricao.value;
        var mensagemErro = "";


        div_erroCadastro.innerHTML = "";
        div_erroCadastro.style.color = "red";

        if (nomeModelo === "" || dataLancamento === "" || marca === "" || descricao === "") {
            mensagemErro += "Todos os campos devem ser preenchidos!<br>";
        }

        var dataAtual = new Date().toISOString().split('T')[0];
        if (dataLancamento > dataAtual) {
            mensagemErro += "A data de lançamento não pode ser uma data futura!";
        }

        if (mensagemErro != "") {
            div_erroCadastro.style.color = "red";
            div_erroCadastro.innerHTML = mensagemErro;
            return;
        }

        fetch("/modelo/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                modeloServer: nomeModelo,
                dataServer: dataLancamento,
                marcaServer: marca,
                descricaoServer: descricao,
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);
                div_erroCadastro.style.color = "green";
                div_erroCadastro.innerHTML = "Cadastro de modelo realizado com sucesso!";

                input_nomeModelo.value = "";
                data_lancamento.value = "0";
                input_marca.value = "";
                input_descricao.value = "";
                return resposta.json();
            })
    }

</script>
